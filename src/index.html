<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentOS Explorer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-window">
        <aside class="sidebar">
            <div class="logo">SOS</div>
            <nav class="nav-menu">
                <div class="nav-item active" data-collection="all">All Data</div>
                <div class="nav-item" data-collection="tasks">Tasks & Habits</div>
                <div class="nav-item" data-collection="notes">Notes</div>
                <div class="nav-item" data-collection="grades">Grades</div>
                <div class="nav-item" data-collection="swimming">Swimming</div>
                <div class="nav-item" data-collection="flashcards">Flashcards</div>
            </nav>
            <div class="sidebar-footer">
                <button id="sync-btn" class="icon-btn"><i data-lucide="refresh-cw"></i></button>
            </div>
        </aside>

        <main class="main-content">
            <div id="connection-banner" class="connection-banner hidden">Offline Mode</div>
            <header class="header">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <h1 id="view-title">All Data</h1>
                    <button id="add-btn" class="icon-btn" title="Create New"><i data-lucide="plus"></i></button>
                </div>
                <div class="search-bar">
                    <i data-lucide="search"></i>
                    <input type="text" id="search-input" placeholder="Search anything...">
                </div>
            </header>

            <section class="data-list" id="data-container">
                <div class="loading-msg">Fetching data from Trailbase...</div>
            </section>
        </main>
    </div>

    <!-- Simple Creation Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modal-title">New Entry</h2>
                <button id="close-modal" class="icon-btn-small"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <select id="entry-type" class="modal-input">
                    <option value="school_notes">Note</option>
                    <option value="tasks">School Task</option>
                    <option value="habits">Habit</option>
                </select>
                <input type="text" id="entry-title" class="modal-input" placeholder="Title">
                <div id="modal-dynamic-fields" class="modal-body" style="padding: 0; margin: 0">
                    <!-- Dynamic fields injected here -->
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-entry-btn" class="btn btn-primary">Save Entry</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Confirm Deletion</h2>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this <span id="delete-item-type">item</span>? This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button id="cancel-delete-btn" class="btn btn-secondary">Cancel</button>
                <button id="confirm-delete-btn" class="btn btn-danger">Delete Forever</button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
